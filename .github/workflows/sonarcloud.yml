name: SonarCloud – Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sonar:
    name: Analyze & Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # voor inline PR-decoratie

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # vereist voor blame-data en new-code detectie

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: "maven"

      # Stap 1: Maven verify → JaCoCo XML genereren (Java 11, geen sonar-maven-plugin nodig)
      - name: Build & test with Maven (generates JaCoCo coverage)
        working-directory: openmrs-module-idgen
        run: mvn -B verify

      # Stap 2: Sonar analyse via standalone scanner action (eigen JRE, vereist geen Java 17 in runner)
      - name: SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: openmrs-module-idgen

      # Bewaar het coverage-rapport als artifact (bewijslast NFR-4/5)
      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "jacoco-report-${{ github.run_number }}"
          path: |
            openmrs-module-idgen/api/target/site/jacoco/
            openmrs-module-idgen/omod/target/site/jacoco/
          retention-days: 90

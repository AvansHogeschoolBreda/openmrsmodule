name: SonarCloud – Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sonar:
    name: Analyze & Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # voor inline PR-decoratie

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # vereist voor blame-data en new-code detectie

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: "maven"

      # JaCoCo coverage + Sonar analyse in één Maven-run
      - name: Build, test & analyze with SonarCloud
        working-directory: openmrs-module-idgen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=avanshogeschoolbreda \
            -Dsonar.organization=AvansHogeschoolBreda \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      # Blokkeer de PR als de quality gate faalt
      - name: Wait for SonarCloud Quality Gate result
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Bewaar het coverage-rapport als artifact (bewijslast NFR-4/5)
      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "jacoco-report-${{ github.run_number }}"
          path: openmrs-module-idgen/target/site/jacoco/
          retention-days: 90

# SonarCloud project configuratie
# Zie ook: .github/workflows/sonarcloud.yml
# Documentatie NFR's: docs/LU2 - Kwaliteit en security - verbeteronderzoek onderhoudbaarheid/Groep_6_Non-Functional-Requirements.md

sonar.projectKey=avanshogeschoolbreda
sonar.organization=AvansHogeschoolBreda

# Broncode en tests
sonar.sources=openmrs-module-idgen/api/src/main/java,openmrs-module-idgen/omod/src/main/java
sonar.tests=openmrs-module-idgen/api/src/test/java,openmrs-module-idgen/omod/src/test/java
sonar.java.binaries=openmrs-module-idgen/api/target/classes,openmrs-module-idgen/omod/target/classes

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage-rapport (gegenereerd door JaCoCo via Maven)
sonar.coverage.jacoco.xmlReportPaths=openmrs-module-idgen/target/site/jacoco/jacoco.xml

# Uitsluitingen: gegenereerde bestanden, resources, frontend
sonar.exclusions=**/target/**,**/*.xml,**/*.properties,**/webapp/**,**/owa/**

# Quality Gate (NFR-referenties: NFR-1 t/m NFR-9)
# De "Sonar Way" default quality gate dekt coverage, duplicatie en ratings.
# Projectspecifieke aanscherpingen worden geconfigureerd via de SonarCloud UI
# onder: sonarcloud.io → Project Settings → Quality Gate

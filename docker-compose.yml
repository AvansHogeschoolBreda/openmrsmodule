version: '3.8'

services:
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-openmrs}
      MYSQL_USER: ${MYSQL_USER:-openmrs}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-openmrs}
    volumes:
      - openmrs-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  openmrs:
    image: openmrs/openmrs-reference-application-distro:2.12.2
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_DATABASE: ${MYSQL_DATABASE:-openmrs}
      DB_HOST: db
      DB_USERNAME: ${MYSQL_USER:-openmrs}
      DB_PASSWORD: ${MYSQL_PASSWORD:-openmrs}
      DB_CREATE_TABLES: 'true'
      DB_AUTO_UPDATE: 'true'
    # De custom OpenMRS module wordt via de omgevingsspecifieke override bestanden (dev/test/prod) gemount

volumes:
  openmrs-db-data:
